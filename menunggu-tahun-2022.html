<!DOCTYPE html>
<html lang="en">
<head>
				<meta charset="UTF-8">
				<meta name="description" content="Time To 2022?">
				<title>Menunggu 2022</title>
				<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
				<style>
				body { 
     background-color: white;
     font-family: 'Fira Sans', sans-serif;
    }
    a {
    color : #0081ff;
    text-decoration: none;
    }
    h4 {
    padding-top: 400px;
    text-align: center; text-justify: center; item-align: center;
    position: absolutely;
    }
    .disable {
    animation: 30s ease disabled ;
    }
    @keyframe disabled {
    0% { opacity: 1; }
    2% { opacity:0;}
    }
				</style>
</head>
<body>

<h4 id="demo"></h4>
				
</iframe>
<script>
// Set the date we're counting down to
var countDownDate = new Date("Jan 1, 2022 00:08:00").getTime();

// Update the count down every 1 second
var x = setInterval(function() {

  // Get today's date and time
  var now = new Date().getTime();

// Find the distance between now and the count down date
  var distance = countDownDate - now;

  // Time calculations for days, hours, minutes and seconds
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  // Display the result in the element with id="demo"
  document.getElementById("demo").innerHTML = "Tinggal : " + days + " Hari " + hours + " Jam "
  + minutes + " Menit " + seconds + " Detik Lagi ☺";

if (distance < 0) {
    clearInterval(x);
    document.getElementById("demo").innerHTML = "<b style='color: blue'>Selamat Tahun Baru 🥳</b>";
  }
}, 1000);
</script>
</body>
</html>
