<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error 404 - Not Found</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:ital,wght@0,100;0,300;0,400;0,500;1,100;1,200;1,300;1,400;1,500&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;1,100;1,200;1,300;1,400;1,500&family=Quicksand:wght@300;400;500&family=Raleway:ital,wght@0,200;0,300;0,400;0,500;0,600;1,200;1,300;1,400;1,500;1,600&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;1,100;1,300;1,400;1,500&family=Rubik:ital,wght@0,300;0,400;1,300;1,400&display=swap');
    * {
      font-family: 'Poppins', sans-serif;
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
    }
    .high-content {
      width: 100%;
      height: 100vh;
      min-height: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 3px 12px;
    }
  </style>
</head>
<body>
  <div id="_app">
    <div class="high-content">
      <div class="matter-content">
        <h2>Not Found</h2>
        <p>Page not found, may have been moved to a new folder or a new location !</p>
      </div>
    </div>
  </div>
  <script src="//ernestoyoofi.github.io/ernestoyoofi/_nextcontent/modifercontent-pages.js"></script>
  <script>modifercontentpages.setTemplate("404-basic", document.getElementById('_app'))</script>
  <script>
    let language = navigator.language || navigator.userLanguage
    let NotFound_textLanguage = {
      id: {
        title: "Error 404 - Tidak ditemukan",
        desc: "Halaman tidak ditemukan, kemungkinan telah dipindahkan ke folder yang baru atau lokasi yang baru !"
      },
      it: {
        title: "Errore 404 - Non Trovato",
        desc: "Pagina non trovata, potrebbe essere stata spostata in una nuova cartella o in una nuova posizione !"
      },
      ja: {
        title: "エラー 404 - 見つかりません",
        desc: "ページが見つかりません。新しいフォルダまたは新しい場所に移動された可能性があります。!"
      },
      jv: {
        title: "Kesalahan 404 - Ora ditemuke",
        desc: "Halaman ora ditemuke, paling uwes dipindah neng folder anyar utawa lokasi sek anyar!"
      }
    }
    if(!!NotFound_textLanguage[language]) {
      document.querySelector('head').setAttribute("lang", language)
      document.querySelector('head title').innerText = NotFound_textLanguage[language].title
      document.querySelector('.matter-content h2').innerText = NotFound_textLanguage[language].title.split("- ")[1]
      document.querySelector('.matter-content p').innerText = NotFound_textLanguage[language].desc
    }
  </script>
</body>
</html>
